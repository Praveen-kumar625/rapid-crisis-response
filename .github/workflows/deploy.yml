name: RCR CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
        working-directory: RCR
      - name: Run tests


        # 🚨 FIXED: Inject placeholder env vars so zod schema and startup checks pass
        run: npm test --workspace=backend -- --passWithNoTests --forceExit
        env:
          NODE_ENV: test
          GEMINI_API_KEY: "mock-key"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test"
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        working-directory: RCR

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
        working-directory: RCR
      - name: Run tests
        run: CI=true npm test --workspace=frontend -- --passWithNoTests
        working-directory: RCR

  build-docker:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rcr-api:latest

      - name: Build & Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rcr-worker:latest
